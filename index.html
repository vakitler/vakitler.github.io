<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Mobil Tarayıcı Üst Çubuğu Renklendirmesi (Theme Color) -->
    <meta name="theme-color" content="#f7f9ff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#121418" media="(prefers-color-scheme: dark)">
    
    <!-- PWA ve iOS Tam Ekran Uygulama Modu Ayarları -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vakitler">
    <link rel="apple-touch-icon" href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230061a4' rx='20'/%3E%3Ctext x='50' y='50' font-size='60' text-anchor='middle' dominant-baseline='central' fill='white'%3E%F0%9F%8C%99%3C/text%3E%3C/svg%3E">
    
    <!-- Tarayıcı Sekmesi İkonu (Favicon - Hilal) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌙</text></svg>">
    
    <title>Vakitler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind için Karanlık Mod yapılandırması
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkSurface: '#121418', // Daha ferah hissetmesi için daha derin bir siyah
                        darkCard: '#1c1f24'
                    },
                    animation: {
                        // Sakinleştirici nefes alma animasyonu
                        'breathe': 'breathe 8s ease-in-out infinite',
                    },
                    keyframes: {
                        breathe: {
                            '0%, 100%': { transform: 'scale(0.95)', opacity: '0.3' },
                            '50%': { transform: 'scale(1.2)', opacity: '0.7' },
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="style.css" rel="stylesheet">
</head>
<body class="min-h-screen pb-20">

    <!-- Header -->
    <header class="p-6 sm:p-8 flex justify-between items-center sticky top-0 bg-[#f7f9ff]/70 dark:bg-[#121418]/70 backdrop-blur-xl z-50 transition-colors duration-700">
        <div class="flex items-center gap-3.5">
            <!-- Hilal Logo Kutusu -->
            <div class="w-11 h-11 rounded-[14px] bg-gradient-to-br from-blue-500 to-blue-700 dark:from-blue-600 dark:to-blue-800 flex items-center justify-center text-white shadow-lg shadow-blue-500/30 dark:shadow-blue-900/50 transition-transform duration-500 hover:scale-105">
                <i data-lucide="moon" class="w-5 h-5 fill-white"></i>
            </div>
            <div>
                <h1 id="app-title" class="text-2xl font-medium text-slate-800 dark:text-white tracking-tight leading-none">Vakitler</h1>
                <p id="current-location-text" class="text-sm text-slate-500 dark:text-slate-400 flex items-center gap-1.5 mt-1.5">
                    <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> <span id="loc-not-selected">Konum Seçilmedi</span>
                </p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleLang()" aria-label="Dili Değiştir" class="p-3.5 rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 transition-all duration-300 hover:scale-105 font-bold text-sm">
                <span id="lang-text">TR</span>
            </button>
            <button onclick="toggleTheme()" aria-label="Temayı Değiştir" class="p-3.5 rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 transition-all duration-300 hover:scale-105">
                <i data-lucide="moon" id="theme-icon" class="w-6 h-6"></i>
            </button>
            <button onclick="toggleSettings()" aria-label="Ayarlar" class="p-3.5 rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 transition-all duration-300 hover:scale-105">
                <i data-lucide="settings" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

    <main class="px-5 sm:px-4 max-w-md mx-auto space-y-8"> <!-- Boşluklar artırıldı (space-y-6 -> space-y-8) -->
        
        <!-- Next Prayer Hero -->
        <section id="hero-section" class="m3-card py-12 px-8 bg-gradient-to-br from-blue-500 to-blue-700 dark:from-blue-800 dark:to-blue-900 text-white flex flex-col items-center text-center relative overflow-hidden shadow-2xl shadow-blue-500/20 dark:shadow-none transition-all duration-700">
            <!-- Nefes alan merkezi ışık hüzmesi efekti -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-72 h-72 bg-white/20 rounded-full blur-[60px] animate-breathe pointer-events-none"></div>
            
            <span class="text-blue-100 text-xs sm:text-sm font-medium uppercase tracking-[0.2em] mb-3 relative z-10" id="next-prayer-name">Sonraki Vakit</span>
            <div class="text-6xl sm:text-7xl font-bold mb-6 time-display drop-shadow-lg relative z-10 tracking-tight" id="countdown-timer">00:00:00</div>
            
            <div class="flex flex-col items-center mb-10 relative z-10 min-h-[40px]">
                <p class="text-blue-100 flex items-center gap-2.5 opacity-90 transition-all">
                    <i data-lucide="clock" class="w-4.5 h-4.5"></i>
                    <span id="next-prayer-time" class="text-lg tracking-wide">--:--</span>
                </p>
                
                <!-- Inline Iftar Countdown (Only visible during Ramadan, from Imsak to Aksam) -->
                <div id="iftar-inline-container" class="hidden flex items-center gap-2.5 mt-4 px-4 py-2 bg-white/10 dark:bg-black/20 rounded-full backdrop-blur-md border border-white/20 shadow-inner transition-all duration-500 animate-slide-up">
                    <i data-lucide="utensils" class="w-3.5 h-3.5 text-orange-300 drop-shadow-sm"></i>
                    <span id="iftar-title" class="text-[10px] sm:text-xs font-medium text-orange-50 uppercase tracking-widest opacity-90">İftara Kalan Süre</span>
                    <span id="iftar-inline-timer" class="text-xs sm:text-sm font-bold text-white tabular-nums tracking-widest drop-shadow-md border-l border-white/20 pl-2.5">00:00:00</span>
                </div>
            </div>
            
            <!-- Progress Bar -->
            <div class="w-full max-w-[85%] bg-black/10 dark:bg-black/30 h-1.5 rounded-full overflow-hidden relative z-10 backdrop-blur-sm">
                <div id="prayer-progress" class="bg-white/95 h-full rounded-full w-0 transition-all duration-1000 ease-linear shadow-[0_0_10px_rgba(255,255,255,0.6)]"></div>
            </div>
        </section>

        <!-- Daily Times Grid -->
        <section class="grid grid-cols-2 gap-4 sm:gap-5" id="daily-times-container">
            <!-- Items will be injected here -->
            <div class="m3-card p-6 flex flex-col items-center justify-center h-36 shimmer"></div>
            <div class="m3-card p-6 flex flex-col items-center justify-center h-36 shimmer"></div>
            <div class="m3-card p-6 flex flex-col items-center justify-center h-36 shimmer"></div>
            <div class="m3-card p-6 flex flex-col items-center justify-center h-36 shimmer"></div>
            <div class="m3-card p-6 flex flex-col items-center justify-center h-36 shimmer"></div>
            <div class="m3-card p-6 flex flex-col items-center justify-center h-36 shimmer"></div>
        </section>

        <!-- Additional Info & Date Card -->
        <div class="m3-card p-6 flex items-center justify-between mb-8">
            <div class="text-left flex-1">
                <p id="gregorian-date" class="text-slate-800 dark:text-slate-200 font-medium text-sm">--</p>
                <p id="hijri-date" class="text-slate-500 dark:text-slate-400 text-xs mt-1.5 tracking-wide">--</p>
            </div>
            <div class="flex items-center gap-5 text-right border-l border-slate-100 dark:border-slate-800 pl-5">
                <div>
                    <p id="qibla-label" class="text-[10px] font-medium text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1">Kıble Saati</p>
                    <p id="qibla-time" class="font-bold text-slate-700 dark:text-slate-300 time-display flex items-center justify-end gap-1.5"><i data-lucide="compass" class="w-3.5 h-3.5 text-slate-400"></i> --:--</p>
                </div>
                <div class="w-12 h-12 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center overflow-hidden border border-slate-100 dark:border-slate-700 shadow-inner">
                    <img id="moon-phase" src="" alt="Ay" class="w-full h-full object-cover hidden transition-opacity duration-1000">
                </div>
            </div>
        </div>

        <!-- Support / Buy Me A Coffee Card -->
        <a href="https://buymeacoffee.com/erdogandemirtas" target="_blank" class="m3-card p-5 flex items-center justify-between mb-8 group hover:-translate-y-1 transition-all duration-500 relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-r from-[#FFDD00]/20 to-transparent dark:from-[#FFDD00]/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
            <div class="flex items-center gap-4 relative z-10">
                <div class="w-10 h-10 rounded-full bg-[#FFDD00]/20 dark:bg-[#FFDD00]/10 flex items-center justify-center text-[#d4b800] dark:text-[#FFDD00] transition-transform duration-500 group-hover:scale-110">
                    <i data-lucide="coffee" class="w-5 h-5"></i>
                </div>
                <div>
                    <p id="buy-coffee-title" class="text-sm font-bold text-slate-800 dark:text-slate-200">Destek Ol</p>
                    <p id="buy-coffee-desc" class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Bana bir kahve ısmarla</p>
                </div>
            </div>
            <i data-lucide="external-link" class="w-4 h-4 text-slate-400 group-hover:text-[#d4b800] dark:group-hover:text-[#FFDD00] transition-colors relative z-10"></i>
        </a>

    </main>

    <!-- Settings/Location Selection Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/40 z-[100] hidden flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white dark:bg-[#202429] w-full max-w-md rounded-t-[32px] sm:rounded-[32px] p-6 animate-slide-up transition-colors duration-300 max-h-[90vh] overflow-y-auto">
            <div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-6 sm:hidden"></div>
            <div class="flex justify-between items-center mb-6">
                <h2 id="settings-title" class="text-xl font-medium dark:text-white">Konum Ayarları</h2>
                <button onclick="toggleSettings()" aria-label="Kapat" class="text-slate-400 p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800"><i data-lucide="x"></i></button>
            </div>
            
            <div class="space-y-5">
                <!-- Ülke -->
                <div class="space-y-2 relative z-30">
                    <label id="label-country" class="text-[11px] font-medium text-slate-500 dark:text-slate-400 ml-2 uppercase tracking-widest">Ülke</label>
                    <div class="relative">
                        <button type="button" id="btn-country" onclick="toggleDropdown('country')" disabled class="w-full px-5 py-4 bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800 rounded-3xl flex items-center justify-between text-left transition-all hover:bg-slate-100 dark:hover:bg-slate-800/60 disabled:opacity-50 disabled:cursor-not-allowed">
                            <span id="text-country" class="text-slate-700 dark:text-slate-200 text-sm font-medium">Yükleniyor...</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition-transform duration-300" id="icon-country"></i>
                        </button>
                        
                        <!-- Özel Açılır Menü (Arama çubuğu içinde) -->
                        <div id="dropdown-country" class="hidden absolute left-0 top-full mt-2 w-full bg-white dark:bg-[#202429] rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-black/50 border border-slate-100 dark:border-slate-700 overflow-hidden flex flex-col transition-all">
                            <div class="p-3 border-b border-slate-50 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/30">
                                <div class="relative">
                                    <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                                    <input type="text" id="search-country" placeholder="Ülke ara..." class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 outline-none text-sm dark:text-white placeholder:text-slate-400 focus:border-blue-500/50 dark:focus:border-blue-500/50 transition-colors" oninput="renderList('country', countriesData, 'UlkeID', 'UlkeAdi', this.value)">
                                </div>
                            </div>
                            <ul id="list-country" class="max-h-48 overflow-y-auto p-2 space-y-1 custom-scrollbar"></ul>
                        </div>
                    </div>
                </div>

                <!-- Şehir -->
                <div class="space-y-2 relative z-20">
                    <label id="label-region" class="text-[11px] font-medium text-slate-500 dark:text-slate-400 ml-2 uppercase tracking-widest">Şehir</label>
                    <div class="relative">
                        <button type="button" id="btn-region" onclick="toggleDropdown('region')" disabled class="w-full px-5 py-4 bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800 rounded-3xl flex items-center justify-between text-left transition-all hover:bg-slate-100 dark:hover:bg-slate-800/60 disabled:opacity-50 disabled:cursor-not-allowed">
                            <span id="text-region" class="text-slate-700 dark:text-slate-200 text-sm font-medium">Önce Ülke Seçin</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition-transform duration-300" id="icon-region"></i>
                        </button>
                        
                        <div id="dropdown-region" class="hidden absolute left-0 top-full mt-2 w-full bg-white dark:bg-[#202429] rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-black/50 border border-slate-100 dark:border-slate-700 overflow-hidden flex flex-col transition-all">
                            <div class="p-3 border-b border-slate-50 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/30">
                                <div class="relative">
                                    <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                                    <input type="text" id="search-region" placeholder="Şehir ara..." class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 outline-none text-sm dark:text-white placeholder:text-slate-400 focus:border-blue-500/50 dark:focus:border-blue-500/50 transition-colors" oninput="renderList('region', regionsData, 'SehirID', 'SehirAdi', this.value)">
                                </div>
                            </div>
                            <ul id="list-region" class="max-h-48 overflow-y-auto p-2 space-y-1 custom-scrollbar"></ul>
                        </div>
                    </div>
                </div>

                <!-- İlçe -->
                <div class="space-y-2 relative z-10">
                    <label id="label-city" class="text-[11px] font-medium text-slate-500 dark:text-slate-400 ml-2 uppercase tracking-widest">İlçe</label>
                    <div class="relative">
                        <button type="button" id="btn-city" onclick="toggleDropdown('city')" disabled class="w-full px-5 py-4 bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800 rounded-3xl flex items-center justify-between text-left transition-all hover:bg-slate-100 dark:hover:bg-slate-800/60 disabled:opacity-50 disabled:cursor-not-allowed">
                            <span id="text-city" class="text-slate-700 dark:text-slate-200 text-sm font-medium">Önce Şehir Seçin</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition-transform duration-300" id="icon-city"></i>
                        </button>
                        
                        <div id="dropdown-city" class="hidden absolute left-0 top-full mt-2 w-full bg-white dark:bg-[#202429] rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-black/50 border border-slate-100 dark:border-slate-700 overflow-hidden flex flex-col transition-all">
                            <div class="p-3 border-b border-slate-50 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/30">
                                <div class="relative">
                                    <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                                    <input type="text" id="search-city" placeholder="İlçe ara..." class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 outline-none text-sm dark:text-white placeholder:text-slate-400 focus:border-blue-500/50 dark:focus:border-blue-500/50 transition-colors" oninput="renderList('city', citiesData, 'IlceID', 'IlceAdi', this.value)">
                                </div>
                            </div>
                            <ul id="list-city" class="max-h-48 overflow-y-auto p-2 space-y-1 custom-scrollbar"></ul>
                        </div>
                    </div>
                </div>
                
                <button id="btn-save-location" onclick="saveLocation()" class="w-full py-4 bg-blue-600 dark:bg-blue-700 text-white rounded-3xl font-medium mt-6 shadow-lg shadow-blue-500/30 dark:shadow-none transition-all hover:bg-blue-700 dark:hover:bg-blue-600 hover:-translate-y-1">
                    Konumu Kaydet
                </button>
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="error-toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-lg hidden z-[110]">
        Bir hata oluştu.
    </div>

    <script src="script.js" defer></script>
</body>
</html>
